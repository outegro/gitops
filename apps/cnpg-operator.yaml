apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-operator
  namespace: infra
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: 0.28.2
    helm:
      releaseName: cnpg
      values: |
        replicaCount: 1
        nodeSelector:
          role: infra
        tolerations:
          - key: role
            operator: Equal
            value: infra
            effect: NoSchedule
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 192Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
