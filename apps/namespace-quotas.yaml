apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespace-quotas
  namespace: infra
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/outegro/gitops.git
    targetRevision: HEAD
    path: infra/namespace-quotas
  destination:
    server: https://kubernetes.default.svc
    # Manifests carry their own namespace (platform, services); this is the fallback.
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
