apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "outegro-service.fullname" . }}
  labels:
    {{- include "outegro-service.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "outegro-service.selectorLabels" . | nindent 6 }}
