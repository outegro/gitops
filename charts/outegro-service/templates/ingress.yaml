{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "outegro-service.fullname" . }}
  labels:
    {{- include "outegro-service.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: traefik
  rules:
    - host: {{ required "ingress.host is required when ingress.enabled" .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "outegro-service.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
  # No tls block needed: Traefik serves websecure with the default wildcard
  # (*.outegro.com) cert via the cluster TLSStore.
{{- end -}}
