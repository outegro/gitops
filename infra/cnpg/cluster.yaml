apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg
  namespace: infra
spec:
  instances: 1
  primaryUpdateStrategy: unsupervised

  storage:
    storageClass: local-path
    size: 10Gi

  # Pin Postgres to the infra node (VPS1). HA across nodes is deferred (spec §8).
  affinity:
    nodeSelector:
      role: infra
    tolerations:
      - key: role
        operator: Equal
        value: infra
        effect: NoSchedule

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 768Mi

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: 128MB

  # Per-service roles (database-per-service). Each service connects with its own
  # login role; password comes from a sealed basic-auth secret.
  managed:
    roles:
      - name: auth
        ensure: present
        login: true
        passwordSecret:
          name: auth-db-credentials

  # PodMonitor is enabled later, once the prometheus-operator CRDs exist
  monitoring:
    enablePodMonitor: false

  # Base backups + WAL archiving to Cloudflare R2 (S3-compatible)
  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: s3://outegro-backups/pg
      endpointURL: https://878d418cde10b8c22ffde6b7cfdaa8cd.r2.cloudflarestorage.com
      s3Credentials:
        accessKeyId:
          name: r2-backup-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: r2-backup-credentials
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 2
      data:
        compression: gzip
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: pg-daily
  namespace: infra
spec:
  # 6-field cron (sec min hour dom month dow): 03:00 every day
  schedule: "0 0 3 * * *"
  backupOwnerReference: self
  cluster:
    name: pg
