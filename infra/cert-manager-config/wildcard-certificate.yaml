apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-outegro-com
  namespace: infra
spec:
  secretName: wildcard-outegro-com-tls
  commonName: "*.outegro.com"
  dnsNames:
    - "*.outegro.com"
    - "outegro.com"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  duration: 2160h    # 90d
  renewBefore: 360h  # 15d
