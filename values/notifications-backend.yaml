# notifications-backend (NestJS). RabbitMQ consumer + Telegram inbound webhook,
# exposed at tg.outegro.com for Telegram to POST bot updates.
image:
  repository: ghcr.io/outegro/notifications-backend
  tag: "930b80f"
imagePullSecrets:
  - name: ghcr-pull
ingress:
  enabled: true
  host: tg.outegro.com
# DATABASE_URL / RABBITMQ_URL / RESEND_API_KEY / TELEGRAM_BOT_TOKEN /
# TELEGRAM_WEBHOOK_SECRET / INTERNAL_API_KEY from sealed secret.
envFrom:
  - secretRef:
      name: notifications-backend-secrets
env:
  - name: NODE_ENV
    value: production
  - name: RESEND_FROM
    value: Outegro <noreply@outegro.com>
  # Public URL registered with Telegram via setWebhook on boot.
  - name: TELEGRAM_WEBHOOK_URL
    value: https://tg.outegro.com/telegram/webhook
migration:
  enabled: true
  command: ["node", "dist/db/migrate"]
