# Per-app values for example-web (Next.js standalone). CI bumps image.tag.
image:
  repository: ghcr.io/outegro/example-web
  tag: "main"

imagePullSecrets:
  - name: ghcr-pull

ingress:
  enabled: true
  host: example.outegro.com

# Next.js exposes health/metrics under /api
probes:
  readiness:
    path: /api/health
  liveness:
    path: /api/health
  startup:
    path: /api/health

podMonitor:
  enabled: true
  path: /api/metrics
