# Per-app values for example-api (NestJS). CI bumps image.tag to the commit sha.
image:
  repository: ghcr.io/outegro/example-api
  tag: "b598c87"
imagePullSecrets:
  - name: ghcr-pull
ingress:
  enabled: true
  host: example-api.outegro.com
env:
  - name: CORS_ORIGIN
    value: https://example.outegro.com
