# auth-web (Next.js) at auth.outegro.com. CI bumps image.tag.
image:
  repository: ghcr.io/outegro/auth-web
  tag: "ad6f9e5"
imagePullSecrets:
  - name: ghcr-pull
ingress:
  enabled: true
  host: auth.outegro.com
env:
  # Server-to-server: talk to auth-backend over the in-cluster service (no internet hop).
  - name: AUTH_API_BASE
    value: http://auth-backend.platform.svc
  # notifications-backend (in-cluster) — telegram link status/unlink.
  - name: NOTIFY_API_BASE
    value: http://notifications-backend.platform.svc
  - name: COOKIE_DOMAIN
    value: .outegro.com
probes:
  readiness:
    path: /api/health
  liveness:
    path: /api/health
  startup:
    path: /api/health
