# Per-app values for auth-backend (NestJS). CI bumps image.tag to the commit sha.
image:
  repository: ghcr.io/outegro/auth-backend
  tag: "d6bcc27"
imagePullSecrets:
  - name: ghcr-pull
ingress:
  enabled: true
  host: api.outegro.com
# DATABASE_URL / REDIS_URL / JWT_PRIVATE_KEY from the sealed secret.
envFrom:
  - secretRef:
      name: auth-backend-secrets
env:
  - name: NODE_ENV
    value: production
  - name: JWT_ISSUER
    value: https://api.outegro.com
  - name: JWT_AUDIENCE
    value: outegro
  - name: COOKIE_DOMAIN
    value: .outegro.com
  - name: CORS_ORIGIN
    value: https://auth.outegro.com,https://outegro.com
  # Public bot @username (no @) used to build the Telegram link deep-link.
  - name: TELEGRAM_BOT_USERNAME
    value: outegro_bot
# Readiness gated on real deps (DB+Redis); liveness stays shallow so a dep blip
# marks NotReady (traffic gated) but doesn't kill the pod.
probes:
  readiness:
    path: /health/deep
# Run Drizzle migrations as a pre-sync Job (never on app boot).
migration:
  enabled: true
  command: ["node", "dist/db/migrate"]
